# Release pipeline for CodeforcesSync
#
# Builds, packages, and publishes the extension for Chrome, Edge, and Firefox
# whenever a stable semver tag v<major>.<minor>.<patch> is pushed.
#
# Triggers
# ─────────
#   push/tags/v[0-9]*.*.*   — glob-level guard: tag must start with 'v', contain
#                              a digit, and have three dot-separated components.
#                              Prevents blatantly malformed tags (vfoo, v1, v1.0)
#                              from triggering the workflow at all.
#
#   Validation step below    — regex-level guard: enforces strict semver before
#                              any build work. Rejects pre-release suffixes
#                              (v1.0.0-beta), non-numeric components (v1a.0.0),
#                              and extra segments (v1.0.0.0).
#
#   The two-layer design is required because GitHub Actions glob syntax cannot
#   express "one or more digits only" for each version component. The glob
#   silently drops unwanted triggers; the regex fails the build with a clear
#   message for the remaining edge cases.
#
# Permissions
# ─────────────
#   contents: write          — create the GitHub Release and upload ZIP assets
#   pull-requests: read      — required by generate-notes API to read merged
#                              PR titles for auto-generated release notes
#
# Jobs
# ─────
#   release (single job)     — validate → lint → build (Chrome) → build (Firefox)
#                              → package 3 ZIPs → create GitHub Release
#                              Single-job design avoids cross-job artifact
#                              upload/download overhead and is simpler to
#                              troubleshoot on GitHub Free.

name: Release

on:
  push:
    tags:
      - 'v[0-9]*.*.*'

permissions:
  contents: write
  pull-requests: read

defaults:
  run:
    shell: bash

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate strict semver tag
        run: |
          node -e "
            const tag = process.env.GITHUB_REF_NAME;
            if (!/^v\d+\.\d+\.\d+$/.test(tag)) {
              console.error('FAIL: tag \"' + tag + '\" is not a stable semver tag (vX.Y.Z)');
              console.error('      Pre-release suffixes, non-numeric components,');
              console.error('      and extra segments are not allowed.');
              process.exit(1);
            }
            const ver = tag.slice(1);
            console.log('✓ Tag \"' + tag + '\" validated — version ' + ver);
          "

      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Write release version to source files
        run: |
          node -e "
            const fs = require('fs');
            const ver = process.env.VERSION;
            ['package.json', 'manifest.json', 'manifest.firefox.json'].forEach(f => {
              const p = JSON.parse(fs.readFileSync(f, 'utf8'));
              p.version = ver;
              fs.writeFileSync(f, JSON.stringify(p, null, 2) + '\n');
              console.log(f + ' -> ' + ver);
            });
          "

      - name: Verify version consistency
        run: |
          PKG_VER=$(node -e "console.log(require('./package.json').version)")
          MAN_VER=$(node -e "console.log(require('./manifest.json').version)")
          FF_VER=$(node -e "console.log(require('./manifest.firefox.json').version)")
          echo "package.json:         $PKG_VER"
          echo "manifest.json:        $MAN_VER"
          echo "manifest.firefox.json: $FF_VER"
          echo "Git tag:              ${{ env.VERSION }}"
          [[ "$PKG_VER" == "${{ env.VERSION }}" ]] || { echo "FAIL: package.json version mismatch"; exit 1; }
          [[ "$MAN_VER" == "${{ env.VERSION }}" ]] || { echo "FAIL: manifest.json version mismatch"; exit 1; }
          [[ "$FF_VER" == "${{ env.VERSION }}" ]] || { echo "FAIL: manifest.firefox.json version mismatch"; exit 1; }
          echo "✓ All versions match: ${{ env.VERSION }}"

      - name: Build Chrome / Edge
        run: npm run build

      - name: Strip design-time assets from Chrome build
        run: rm -rf dist/img dist/logos dist/UI

      - name: Rename Chrome build directory
        run: mv dist dist-chrome

      - name: Build Firefox
        run: npm run build:firefox

      - name: Strip design-time assets from Firefox build
        run: rm -rf dist/img dist/logos dist/UI

      - name: Rename Firefox build directory
        run: mv dist dist-firefox

      - name: Package Chrome
        run: cd dist-chrome && zip -r "../CodeforcesSync-Chrome-${{ env.VERSION }}.zip" .

      - name: Package Edge (reuses Chrome build)
        run: cp "CodeforcesSync-Chrome-${{ env.VERSION }}.zip" "CodeforcesSync-Edge-${{ env.VERSION }}.zip"

      - name: Package Firefox
        run: cd dist-firefox && zip -r "../CodeforcesSync-Firefox-${{ env.VERSION }}.zip" .

      - name: Verify release artifacts
        run: |
          ls -lh "CodeforcesSync-Chrome-${{ env.VERSION }}.zip"
          ls -lh "CodeforcesSync-Edge-${{ env.VERSION }}.zip"
          ls -lh "CodeforcesSync-Firefox-${{ env.VERSION }}.zip"

      - name: Generate release body
        run: |
          RELEASE_DATE=$(date -u +"%Y-%m-%d")
          echo "RELEASE_DATE=$RELEASE_DATE" >> "$GITHUB_ENV"
          export RELEASE_DATE

          gh api \
            repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="${{ github.ref_name }}" \
            --jq '.body' > generated-notes.md

          node -e "
            const fs = require('fs');
            const template = fs.readFileSync('.github/release-template.md', 'utf8');
            const generated = fs.readFileSync('generated-notes.md', 'utf8');
            const body = template
              .replace(/\$\{VERSION\}/g, process.env.VERSION)
              .replace(/\$\{RELEASE_DATE\}/g, process.env.RELEASE_DATE)
              .replace(/\$\{REPOSITORY\}/g, process.env.GITHUB_REPOSITORY)
              + '\n\n---\n\n## 📋 Automated Changelog\n\n' + generated;
            fs.writeFileSync('release-body.md', body);
          "
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            "CodeforcesSync-Chrome-${{ env.VERSION }}.zip" \
            "CodeforcesSync-Edge-${{ env.VERSION }}.zip" \
            "CodeforcesSync-Firefox-${{ env.VERSION }}.zip" \
            --notes-file release-body.md \
            --title "CodeforcesSync ${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
