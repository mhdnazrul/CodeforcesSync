name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - name: Package extension
        run: |
          mkdir -p release
          cd dist
          zip -r ../release/CodeforcesSync-${{ github.ref_name }}.zip .
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/CodeforcesSync-${{ github.ref_name }}.zip
          generate_release_notes: true
          body: |
            ## CodeforcesSync ${{ github.ref_name }}

            See [CHANGELOG](https://github.com/mhdnazrul/CodeforcesSync/blob/main/CHANGELOG.md) for details.

            ### Installation

            1. Download the ZIP file below.
            2. Extract it to a folder.
            3. Open Chrome → `chrome://extensions` → Developer mode → Load unpacked → Select the extracted folder.
